- name: install packages using loop
  hosts: frontend
  become: yes
  tasks:
  - name: install packages
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
      - { name: "nginx", state: "present" }
      - { name: "git", state: "present" }
      - { name: "mysql", state: "absent" }